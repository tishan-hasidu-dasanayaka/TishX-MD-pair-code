<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TishX-MD Session Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f0c20 0%, #15102a 50%, #06040a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Background Decorative Glowing Orbs */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            filter: blur(80px);
            opacity: 0.15;
            z-index: 0;
        }
        body::before { top: -50px; left: -50px; }
        body::after { bottom: -50px; right: -50px; background: linear-gradient(45deg, #b92b27, #1565c0); }

        /* Glassmorphism Container */
        .container {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 24px;
            padding: 40px 30px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        h1 {
            color: #fff;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: 1px;
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #a0aec0;
            font-size: 14px;
            margin-bottom: 30px;
        }

        /* Styled Input Box */
        .input-group {
            position: relative;
            margin-bottom: 25px;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #00f2fe;
            font-size: 18px;
        }

        input {
            width: 100%;
            padding: 15px 15px 15px 50px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: #00f2fe;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
        }

        /* Neon Submit Button */
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            border: none;
            border-radius: 12px;
            color: #0f0c20;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 242, 254, 0.5);
        }

        button:active {
            transform: translateY(0);
        }

        /* Elegant Loading Spinner */
        .loading-container {
            display: none;
            margin-top: 25px;
        }

        .spinner {
            width: 45px;
            height: 45px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #00f2fe;
            border-radius: 50%;
            margin: 0 auto 15px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            color: #00f2fe;
            font-size: 14px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        /* Pairing Code Display Box */
        .code-container {
            display: none;
            margin-top: 25px;
            background: rgba(0, 242, 254, 0.05);
            border: 1px dashed rgba(0, 242, 254, 0.3);
            border-radius: 12px;
            padding: 20px;
            align-items: center;
            justify-content: space-between;
        }

        .code-display {
            color: #fff;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 3px;
        }

        .copy-btn {
            width: auto;
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.08);
            color: #00f2fe;
            border: 1px solid rgba(0, 242, 254, 0.3);
            box-shadow: none;
            font-size: 14px;
        }

        .copy-btn:hover {
            background: #00f2fe;
            color: #0f0c20;
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.3);
        }

        .status-msg {
            margin-top: 15px;
            font-size: 13px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>TishX-MD</h1>
        <p>Enter number to generate your bot session</p>

        <div class="input-group">
            <i class="fa-solid fa-phone"></i>
            <input type="text" id="phoneNumber" placeholder="947xxxxxxxx">
        </div>

        <button id="submitBtn" onclick="getPairingCode()">Get Pairing Code</button>

        <div class="loading-container" id="loadingArea">
            <div class="spinner"></div>
            <div class="loading-text">Connecting to WhatsApp Server...</div>
        </div>

        <div class="code-container" id="codeArea">
            <div class="code-display" id="pairingCode">XXXX-XXXX</div>
            <button class="copy-btn" id="copyBtn" onclick="copyCode()"><i class="fa-regular fa-copy"></i> Copy</button>
        </div>

        <div class="status-msg" id="statusMessage"></div>
    </div>

    <script>
        async function getPairingCode() {
            const phoneInput = document.getElementById('phoneNumber').value.trim();
            const submitBtn = document.getElementById('submitBtn');
            const loadingArea = document.getElementById('loadingArea');
            const codeArea = document.getElementById('codeArea');
            const statusMsg = document.getElementById('statusMessage');

            if (!phoneInput) {
                alert('Please enter a valid phone number!');
                return;
            }

            // UI Changes (Hide code/button, Show loading)
            submitBtn.style.display = 'none';
            codeArea.style.display = 'none';
            statusMsg.style.display = 'none';
            loadingArea.style.display = 'block';

            try {
                // Fetch call to backend without reloading page
                const response = await fetch(`/pair?phone=${phoneInput}`);
                const data = await response.json();

                loadingArea.style.display = 'none';

                if (data.code) {
                    document.getElementById('pairingCode').innerText = data.code;
                    codeArea.style.display = 'flex';
                    statusMsg.style.color = '#48bb78';
                    statusMsg.innerHTML = '<i class="fa-solid fa-circle-check"></i> Code generated! Enter it in WhatsApp Link Device.';
                    statusMsg.style.display = 'block';
                } else {
                    throw new Error(data.error || 'Failed to fetch code');
                }

            } catch (error) {
                loadingArea.style.display = 'none';
                submitBtn.style.display = 'block';
                statusMsg.style.color = '#f56565';
                statusMsg.innerText = error.message || 'Server error. Please try again.';
                statusMsg.style.display = 'block';
            }
        }

        function copyCode() {
            const codeText = document.getElementById('pairingCode').innerText;
            navigator.clipboard.writeText(codeText);
            
            const copyBtn = document.getElementById('copyBtn');
            copyBtn.innerHTML = '<i class="fa-solid fa-check"></i> Copied';
            setTimeout(() => {
                copyBtn.innerHTML = '<i class="fa-regular fa-copy"></i> Copy';
            }, 2000);
        }
    </script>
</body>
</html>
